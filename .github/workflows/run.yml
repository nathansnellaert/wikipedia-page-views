name: Run Connector
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # Required to re-trigger workflow

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run connector
      id: run
      run: |
        set +e
        uv run python main.py
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        exit 0  # Always succeed so we can handle exit code ourselves
      env:
        PYTHONUNBUFFERED: 1
        RUN_ID: ${{ github.run_id }}
        ENVIRONMENT: prod
        DATA_DIR: subsets
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    - name: Commit state
      if: always()
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add .state/ || true
        if ! git diff --quiet HEAD; then
          git commit -m "Update state from run ${{ github.run_id }}"
          git push
        fi

    - name: Re-trigger if more work needed
      if: steps.run.outputs.exit_code == '2'
      run: |
        echo "Time budget exhausted, triggering continuation..."
        gh workflow run run.yml
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Fail if error
      if: steps.run.outputs.exit_code != '0' && steps.run.outputs.exit_code != '2'
      run: |
        echo "Connector failed with exit code ${{ steps.run.outputs.exit_code }}"
        exit 1
