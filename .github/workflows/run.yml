name: Run Wikipedia Page Views Connector

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:  

jobs:
  run-connector:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip' 
    
    - name: Install uv for fast package installation
      run: pip install uv
    
    - name: Install dependencies
      run: |
        # Install dependencies using uv
        uv sync
    
    - name: Run connector with timeout
      id: run
      run: |
        # Run with 5h 50m timeout, capturing exit code
        timeout --signal=TERM --kill-after=30s 5h50m uv run python main.py || EXIT_CODE=$?
        
        # Check if it was a timeout (exit code 124)
        if [ "$EXIT_CODE" = "124" ]; then
          echo "timeout=true" >> $GITHUB_OUTPUT
          echo "⏰ Connector timed out after 5h 50m"
          exit 124
        elif [ -n "$EXIT_CODE" ] && [ "$EXIT_CODE" != "0" ]; then
          echo "❌ Connector failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        else
          echo "timeout=false" >> $GITHUB_OUTPUT
          echo "✅ Connector completed successfully"
        fi
      env:
        RUN_ID: ${{ github.run_id }}
        PYTHONUNBUFFERED: "1"
        STORAGE_BACKEND: "r2"
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        ENABLE_HTTP_CACHE: "false" 
        WRITE_SNAPSHOT: "false"
        DATA_COLLECTION_START_DATE: "2024-01-01"
      continue-on-error: true
    
    - name: Commit state changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Check if .state directory exists and has changes
        if [ -d ".state" ]; then
          git add .state/
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            # Include timeout info in commit message if applicable
            if [ "${{ steps.run.outputs.timeout }}" = "true" ]; then
              git commit -m "Update state from run ${{ github.run_id }} (timed out after 5h50m)"
            else
              git commit -m "Update state from run ${{ github.run_id }}"
            fi
            git push
          else
            echo "No state changes to commit"
          fi
        else
          echo "No .state directory found"
        fi
    
    - name: Trigger rerun if timeout
      if: steps.run.outputs.timeout == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          console.log('🔄 Triggering workflow rerun due to timeout...');
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'run.yml',
            ref: 'main'
          });
          console.log('✅ Rerun triggered successfully'); 