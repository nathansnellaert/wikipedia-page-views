[project]
name = "wikipedia-page-views"
version = "0.1.0"
description = "Wikipedia page views data connector"
requires-python = ">=3.11"
dependencies = [
    "pyarrow>=21.0.0",
    "httpx>=0.27.0",
    "tenacity>=8.0.0",
    "ratelimit>=2.2.1",
    "boto3>=1.34.0",
    "duckdb>=0.10.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["assets", "utils"]