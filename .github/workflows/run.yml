name: Run Wikipedia Page Views Connector

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:  

jobs:
  run-connector:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip' 
    
    - name: Install uv for fast package installation
      run: pip install uv
    
    - name: Install dependencies
      run: |
        # Install dependencies using uv
        uv sync
    
    - name: Run connector
      run: |
        uv run python main.py
      env:
        RUN_ID: ${{ github.run_id }}
        PYTHONUNBUFFERED: "1"
        STORAGE_BACKEND: "r2"
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        ENABLE_HTTP_CACHE: "false" 
        WRITE_SNAPSHOT: "false"
        DATA_COLLECTION_START_DATE: "2024-01-01"
    
    - name: Commit state changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Check if .state directory exists and has changes
        if [ -d ".state" ]; then
          git add .state/
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Update state from run ${{ github.run_id }}"
            git push
          else
            echo "No state changes to commit"
          fi
        else
          echo "No .state directory found"
        fi 